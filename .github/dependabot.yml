# Keep dependency PRs grouped and delayed for at least 48 hours so newly published packages age before adoption.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(deps)"
    cooldown:
      default-days: 2
    groups:
      github-actions-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    cooldown:
      default-days: 2
    # typescript-eslint 8.x (latest, including canary) caps its typescript peer
    # range at "<6.1.0", so TypeScript is pinned to ~6.0.3 until typescript-eslint
    # ships support for TS 6.1+/7.x. Remove this ignore once that lands upstream.
    ignore:
      - dependency-name: "undici"
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
    groups:
      npm-dependencies:
        patterns:
          - "*"
