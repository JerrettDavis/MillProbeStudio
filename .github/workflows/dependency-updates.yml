name: Dependency Updates

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # @codecov/vite-plugin@2.0.1 (latest published) only declares peer
        # support for vite 4.x-6.x, but this repo runs vite 8. No published
        # @codecov/vite-plugin version supports vite 8 yet, and downgrading
        # vite would regress the app, so we tolerate the peer mismatch here
        # rather than block dependency automation on an upstream lag.
        run: npm ci --legacy-peer-deps

      - name: Update dependencies
        run: |
          npm update --legacy-peer-deps
          npm audit fix --force --legacy-peer-deps || true

      - name: Run tests
        run: |
          npm run test
          npm run build

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(deps): update dependencies'
          title: 'chore(deps): automated dependency updates'
          body: |
            ## 🔄 Automated Dependency Updates
            
            This PR contains automated dependency updates.
            
            ### Changes
            - Updated npm dependencies to latest compatible versions
            - Applied security fixes via `npm audit fix`
            
            ### Testing
            - ✅ All tests pass
            - ✅ Build successful
            
            This PR was automatically created by the dependency update workflow.
          branch: chore/dependency-updates
          delete-branch: true
          base: main
